<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">SkinApex</title>
  <desc id="desc">Minecraft Bedrock skin pack editor with 3D preview, bone editing, and animation tools.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#121821"/>
      <stop offset="100%" stop-color="#1e1e1e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#007acc"/>
      <stop offset="100%" stop-color="#00b4d8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1040" cy="120" r="180" fill="#007acc" opacity="0.08"/>
  <circle cx="140" cy="560" r="200" fill="#00b4d8" opacity="0.06"/>

  <g transform="translate(96 112)">
    <polygon points="92,0 184,46 184,154 92,200 0,154 0,46" fill="none" stroke="url(#accent)" stroke-width="10"/>
    <polygon points="92,54 144,82 144,136 92,164 40,136 40,82" fill="url(#accent)" opacity="0.72"/>
  </g>

  <text x="96" y="390" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="74" font-weight="700">SkinApex</text>
  <text x="96" y="450" fill="#b7c0cc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30">Minecraft Bedrock skin pack editor</text>
  <text x="96" y="500" fill="#d7e9f6" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24">3D preview  •  Bone editing  •  Animation mapping  •  Pack tools</text>

  <rect x="800" y="338" width="290" height="160" rx="18" fill="#131923" stroke="#2c4257"/>
  <rect x="828" y="366" width="234" height="18" rx="9" fill="#203244"/>
  <rect x="828" y="400" width="180" height="18" rx="9" fill="#1a2a39"/>
  <rect x="828" y="434" width="210" height="18" rx="9" fill="#1a2a39"/>
  <rect x="828" y="468" width="146" height="18" rx="9" fill="#007acc" opacity="0.9"/>
</svg>
